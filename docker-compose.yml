services:
  planfix-ajax-api:
    build: .
    command: ["python", "run.py"]
    ports:
      - "8000:8000"
    environment:
      SWAGGER_ENABLED: true
      BROWSER_HEADLESS: true
      BROWSER_TIMEOUT: 30000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/ready')"]
      interval: 30s
      timeout: 5s
      retries: 3
